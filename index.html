    }

    p {

      border-radius: 50px;

      color: black;
      font-weight: 700;
      text-decoration: none;
      transition: 0.3s;
      letter-spacing: 1px;
    }

    .btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 25px rgba(0,255,255,0.9);
    }

    footer {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #666;
    }
  </style>
</head>
